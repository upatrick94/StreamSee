spring.application.name=playlist-backend

server.address=0.0.0.0
server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always

spring.datasource.url=jdbc:h2:file:./data/mpp-playlists;MODE=PostgreSQL;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173,http://192.168.1.155:5173,http://192.168.2.1:5173
spring.data.mongodb.uri=mongodb://localhost:27017/mpp_chat
spring.data.mongodb.auto-index-creation=true

app.session.timeout-seconds=900

server.ssl.enabled=${APP_SSL_ENABLED:false}
server.ssl.key-store=${APP_SSL_KEY_STORE:}
server.ssl.key-store-password=${APP_SSL_KEY_STORE_PASSWORD:}
server.ssl.key-store-type=${APP_SSL_KEY_STORE_TYPE:PKCS12}
server.ssl.key-alias=${APP_SSL_KEY_ALIAS:}

app.mail.from=ursu.patrick94@gmail.com
